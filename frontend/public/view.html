<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Tasks | Student Task Management</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-require-auth="true">
  <header>
    <div class="header-inner container">
      <div class="brand-group">
        <h1>Student Task Management</h1>
        <nav>
          <a href="index.html">Home</a>
          <a href="dashboard.html">Dashboard</a>
          <a href="add.html">Add Task</a>
          <a href="view.html">View Tasks</a>
        </nav>
      </div>
      <button id="themeToggle" class="theme-toggle" type="button">Night Mode</button>
    </div>
  </header>

  <main class="container">
    <section class="form-card">
      <h2>All Tasks</h2>
      <p class="subtitle">Search, review, and manage every task from one colorful dashboard.</p>

      <div class="search-row">
        <input type="text" id="searchInput" placeholder="Search tasks by title...">
        <a class="button secondary" href="add.html">Add New Task</a>
      </div>

      <p id="message" class="message view-message"></p>

      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Description</th>
              <th>Due Date</th>
              <th>Document</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tasksTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
